<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechVolt | Instalações, Reparações e Inspeções Elétricas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-principal: #070708; 
            --bg-secundario: #0f1015; 
            --bg-cartao: #14161e; 
            --cor-azul: #00d2ff; 
            --cor-dourado: #ffb703; 
            --cor-dourado-hover: #fb8500;
            --texto-claro: #ffffff;
            --texto-mutado: #94a3b8;
            --alerta: #ef4444;
            --whatsapp: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--bg-principal); color: var(--texto-claro); line-height: 1.5; font-size: 1.15rem; }
        h1, h2, h3, h4, .logo { font-family: 'Orbitron', sans-serif; letter-spacing: 0.05em; }

        header { background-color: rgba(7, 7, 8, 0.95); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 2px solid rgba(0, 210, 255, 0.2); backdrop-filter: blur(10px); }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0.8rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo-img { height: 50px; display: block; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { color: var(--texto-mutado); text-decoration: none; font-weight: 600; text-transform: uppercase; font-size: 1rem; transition: color 0.3s; }
        .nav-links a:hover { color: var(--cor-azul); }
        .btn-header { background: linear-gradient(90deg, var(--cor-azul), var(--cor-dourado)); color: var(--bg-principal); padding: 0.6rem 1.4rem; border-radius: 4px; font-weight: 800; text-decoration: none; text-transform: uppercase; font-size: 0.95rem; box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); transition: transform 0.3s; }
        
        .hero { padding: 11rem 2rem 6rem 2rem; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 4rem; align-items: center; }
        .hero-text h1 { font-size: 2.8rem; line-height: 1.1; margin-bottom: 1.5rem; text-transform: uppercase; }
        .hero-text h1 .azul { color: var(--cor-azul); }
        .hero-text h1 .dourado { color: var(--cor-dourado); }
        .hero-form-box { background-color: var(--bg-secundario); border: 1px solid rgba(0, 210, 255, 0.2); border-radius: 8px; padding: 2.5rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group input, .form-group textarea { width: 100%; background-color: var(--bg-cartao); border: 1px solid #2e323d; padding: 0.8rem; border-radius: 4px; color: white; }
        .btn-submit { width: 100%; background: linear-gradient(90deg, var(--cor-dourado), var(--cor-dourado-hover)); color: var(--bg-principal); border: none; padding: 1rem; border-radius: 4px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        .servicos-section { padding: 6rem 2rem; max-width: 1200px; margin: 0 auto; }
        .servicos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
        .servico-card { background-color: var(--bg-secundario); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 6px; padding: 2.5rem; }
        
        .whatsapp-float { position: fixed; bottom: 30px; right: 30px; background-color: var(--whatsapp); color: white; width: 60px; height: 60px; border-radius: 50px; display: flex; justify-content: center; align-items: center; font-size: 32px; z-index: 1000; }
        
        @media (max-width: 968px) { .hero { grid-template-columns: 1fr; } .nav-links, .btn-header { display: none; } }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo-box"><img src="logo.gif" alt="TechVolt Logo" class="logo-img"></div>
            <ul class="nav-links">
                <li><a href="#servicos">Serviços</a></li>
                <li><a href="#termografia">Termografia</a></li>
            </ul>
            <a href="https://wa.me/351969242077" target="_blank" class="btn-header">Urgências</a>
        </div>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h1><span class="azul">Instalações</span> & <span class="dourado">Inspeções</span> Elétricas</h1>
            <p>Técnico responsável inscrito na DGEG. Qualidade, segurança e conformidade técnica.</p>
        </div>
        <div class="hero-form-box">
            <h3>Solicitar Avaliação</h3>
            <form action="https://formspree.io/f/mjvndqoz" method="POST">
                <div class="form-group"><input type="text" name="name" required placeholder="Nome"></div>
                <div class="form-group"><input type="tel" name="phone" required placeholder="Telefone"></div>
                <div class="form-group"><textarea name="message" rows="3" required placeholder="Descrição"></textarea></div>
                <button type="submit" class="btn-submit">Enviar</button>
            </form>
        </div>
    </section>

    <a href="https://wa.me/351969242077" class="whatsapp-float" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
</body>
</html>
